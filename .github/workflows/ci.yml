name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"

      - name: Stub local secrets for CI
        run: |
          cp lib/config/secrets.local.example.dart lib/config/secrets.local.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Check release secrets (example stub)
        continue-on-error: true
        run: dart run tool/check_release_secrets.dart

  edge-function:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test vision-score helpers
        working-directory: supabase/functions/vision-score
        run: deno test lib_test.ts
